name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A72C6A: ${{ secrets.A72C6A }}
          B3B984: ${{ secrets.B3B984 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A72C6A', '')
          tag_b = os.environ.get('B3B984', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 0464ad03126ee90b3376d095ed799569 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- d1ef739f89b9f72d3b46243a1ded760e07 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
